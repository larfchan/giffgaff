plugins {
    id "com.android.application"
}

android {
    namespace "com.larfchan.giffgaffkeepalive"
    compileSdk 36

    defaultConfig {
        applicationId "com.larfchan.giffgaffkeepalive"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError true
        checkDependencies true
        warningsAsErrors false
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
}

